spring.application.name = quant-ai-persistence-etl
server.port = 10070

spring.data.mongodb.host = localhost
spring.data.mongodb.port = 10000
spring.data.mongodb.database = monolith

mongo.url=mongodb://localhost:10000/

# Internal Variables
## External APIs
quantai.external.api.newsarticle.bbc = https://datasets-server.huggingface.co/
quantai.external.api.cryptocompare.key=test_api_key
quantai.external.api.cryptocompare.url=https://min-api.cryptocompare.com

# H2 Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MongoDB Configuration for Tests
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=testdb

# Disable Spring Security for Tests
spring.security.user.name=test
spring.security.user.password=test